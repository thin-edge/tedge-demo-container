# Runs the cgroup monitoring scripts via the exec plugin.
#
# cgroup-memory: Report per-service memory using cgroup accounting (memory.current /
#   memory.usage_in_bytes). This matches what systemd shows in `systemctl status` —
#   each physical page is counted once, unlike ps_rss which double-counts shared library pages.
#   Produces:
#     collectd/<host>/cgroup-mosquitto/memory
#     collectd/<host>/cgroup-tedge-all/memory   (sum of all running tedge services)
#
# cgroup-cpu: Report per-service CPU usage as a percentage using cgroup accounting.
#   On the first collectd run a baseline is recorded; from the second run onwards a
#   rolling CPU% over the polling interval is emitted.
#   Produces:
#     collectd/<host>/cgroup-mosquitto/percent-cpu
#     collectd/<host>/cgroup-tedge-all/percent-cpu   (sum of all running tedge services)

<LoadPlugin exec>
    Interval 60
</LoadPlugin>

<Plugin exec>
    Exec "nobody" "/usr/share/collectd/cgroup-memory"
    Exec "nobody" "/usr/share/collectd/cgroup-cpu"
</Plugin>
